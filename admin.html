<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>XANVOR — Catalogue Admin</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500&family=Cormorant+Garamond:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --claret-deep:#241510; --ink:#1F140C; --brass:#B68B5C; --bone:#F4EEE2;
    --rust:#A85D2A; --paper:#FCFAF4; --line:#E6DCC8; --line-strong:#D8CBB0;
    --ink-soft:#6E6151; --ink-faint:#9A8E7C; --ok:#1F8A5B; --bad:#A32D2D;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bone);color:var(--ink);font-family:'Cormorant Garamond',serif;font-size:17px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}
  .mono{font-family:'JetBrains Mono',monospace;}
  header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 4vw;background:rgba(252,250,244,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  header .brand{font-family:'Fraunces',serif;font-size:19px;letter-spacing:.15em;color:var(--claret-deep);}
  header .sub{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--rust);}
  .wrap{max-width:1080px;margin:0 auto;padding:26px 4vw 90px;}
  .panel{background:var(--paper);border:1px solid var(--line-strong);border-radius:10px;padding:22px;margin-bottom:20px;}
  h2{font-family:'Fraunces',serif;font-weight:400;font-size:21px;color:var(--claret-deep);margin-bottom:14px;}
  label{display:block;font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:#5A4636;margin:0 0 5px;}
  input,select,textarea{width:100%;background:#fff;color:var(--claret-deep);border:1px solid var(--line-strong);padding:10px 12px;font-family:'Cormorant Garamond',serif;font-size:16px;border-radius:6px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--rust);}
  textarea{min-height:74px;resize:vertical;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .grid .span2{grid-column:span 2;} .grid .span3{grid-column:1 / -1;}
  @media(max-width:720px){ .grid{grid-template-columns:1fr 1fr;} .grid .span2,.grid .span3{grid-column:1 / -1;} }
  .btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:50px;padding:11px 22px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;transition:all .2s;}
  .btn-primary{background:var(--rust);color:#FBF6E8;} .btn-primary:hover{background:#C0712F;}
  .btn-ghost{background:none;border:1px solid var(--line-strong);color:#5A4636;} .btn-ghost:hover{border-color:var(--rust);color:var(--rust);}
  .btn-danger{background:none;border:1px solid #E4B9B9;color:var(--bad);}
  .btn[disabled]{opacity:.5;pointer-events:none;}
  .row{display:grid;grid-template-columns:54px 1fr auto;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .thumb{width:54px;height:54px;border-radius:6px;border:1px solid var(--line);background:#fff;object-fit:cover;}
  .r-name{font-family:'Fraunces',serif;font-size:16.5px;color:var(--claret-deep);}
  .r-meta{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.1em;color:var(--ink-faint);margin-top:3px;text-transform:uppercase;}
  .r-meta b{color:var(--rust);font-weight:500;}
  .r-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
  .r-actions .btn{padding:7px 14px;font-size:9px;}
  .toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:6px;}
  .toolbar input{max-width:280px;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--claret-deep);color:#FBF6E8;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;padding:12px 20px;border-radius:50px;opacity:0;pointer-events:none;transition:opacity .3s;max-width:90vw;text-align:center;z-index:99;}
  .toast.show{opacity:1;}
  .toast.bad{background:var(--bad);}
  .imgbox{display:flex;gap:14px;align-items:center;}
  .imgbox img{width:84px;height:84px;border-radius:8px;border:1px solid var(--line-strong);object-fit:cover;background:#fff;}
  .hint{font-size:14px;color:var(--ink-soft);font-style:italic;margin-top:5px;}
  .price-hint{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:var(--ok);margin-top:6px;}
  .hidden{display:none !important;}
  .count{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);}
</style>
</head>
<body>
<header>
  <div><div class="brand">XANVOR</div><div class="sub">Catalogue admin</div></div>
  <div style="display:flex;gap:10px;">
    <a class="btn btn-ghost" href="index.html">Site dekho</a>
    <button class="btn btn-ghost hidden" id="lockBtn">Lock</button>
  </div>
</header>
<div class="wrap">

  <div class="panel" id="gate">
    <h2>Admin key</h2>
    <div class="grid">
      <div class="span2"><label>Key</label><input type="password" id="keyInput" placeholder="Admin key daalo" autocomplete="current-password"></div>
      <div style="align-self:end;"><button class="btn btn-primary" id="unlockBtn">Kholo</button></div>
    </div>
    <p class="hint">Key galat hone par list nahi khulegi. Key Netlify ke environment variable XANVOR_ADMIN_KEY me set hai.</p>
  </div>

  <div class="panel hidden" id="listPanel">
    <div class="toolbar">
      <h2 style="margin:0;flex:1;">Products <span class="count" id="count"></span></h2>
      <input type="search" id="search" placeholder="Search — naam ya id">
      <button class="btn btn-primary" id="addBtn">+ Naya product</button>
    </div>
    <div id="list"></div>
  </div>

  <div class="panel hidden" id="formPanel">
    <h2 id="formTitle">Naya product</h2>
    <div class="grid">
      <div><label>ID * <span class="mono">(jaise fw-113)</span></label><input id="f_id" placeholder="fw-113"></div>
      <div class="span2"><label>Naam *</label><input id="f_name" placeholder="Royal Dome Hot-Pot"></div>
      <div><label>Collection *</label><select id="f_collection"></select></div>
      <div class="span2"><label>Series</label><input id="f_series" placeholder="The Hot-Serve Collection · Hand-hammered…"></div>
      <div class="span2"><label>Materials ( · se alag karo)</label><input id="f_materials" placeholder="Solid Brass · Hand-Hammered · Lacquered"></div>
      <div><label>Tag</label><input id="f_tag" placeholder="The Centrepiece"></div>
      <div class="span3"><label>Description</label><textarea id="f_desc" placeholder="2–3 line ki achhi description — Google me yahi dikhegi"></textarea></div>
      <div><label>Sizes</label><input id="f_sizes" placeholder="1500 / 2500 ml (rep: 2500)"></div>
      <div><label>Construction</label><input id="f_construction" placeholder="Double-wall, insulated"></div>
      <div><label>MOQ (B2B)</label><input id="f_moq" placeholder="20 pcs"></div>
      <div><label>HSN</label><input id="f_hsn" placeholder="7323"></div>
      <div><label>GST</label><select id="f_gst"><option value="">—</option><option>18%</option><option>12%</option><option>5%</option></select></div>
      <div><label>Stock</label><select id="f_availability"><option value="">In stock</option><option value="out_of_stock">Out of stock</option></select></div>
      <div><label>MRP ₹</label><input id="f_mrp" inputmode="numeric" placeholder="4499"></div>
      <div><label>Retail ₹ (ex-GST)</label><input id="f_retail" inputmode="numeric" placeholder="3399"></div>
      <div><label>Offer ₹ (B2B/trade)</label><input id="f_offer" inputmode="numeric" placeholder="2100"></div>
      <div class="span3"><div class="price-hint" id="priceHint"></div></div>
      <div class="span3"><label>Highlights — ek line me ek</label><textarea id="f_highlights" placeholder="Solid brass, double-wall&#10;Food-safe SS304 inner"></textarea></div>
      <div class="span3">
        <label>Photo</label>
        <div class="imgbox">
          <img id="imgPreview" alt="" src="data:image/gif;base64,R0lGODlhAQABAAAAACw=">
          <div style="flex:1;">
            <input type="file" id="f_file" accept="image/jpeg,image/png,image/webp">
            <input type="hidden" id="f_image">
            <p class="hint" id="imgStatus">JPG/PNG chuno — apne aap chhota (1600px) karke upload hoga.</p>
          </div>
        </div>
      </div>
      <div class="span3" style="display:flex;gap:10px;align-items:center;">
        <input type="checkbox" id="f_signature" style="width:auto;"><label for="f_signature" style="margin:0;">Signature piece</label>
      </div>
      <div class="span3" style="display:flex;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="saveBtn">Save — live karo</button>
        <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>
<script src="assets/img-opt.js?v=1"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const COLLECTIONS = ['Silver & Gold','Copper','Brass','Sheesham & Wood','Wireform Furniture','Hot-Serve'];
  $('f_collection').innerHTML = COLLECTIONS.map(c=>`<option>${c}</option>`).join('');
  let KEY = sessionStorage.getItem('xv_admin_key') || '';
  let CATALOG = [];
  let editingId = null;

  const toast = (msg, bad) => { const t=$('toast'); t.textContent=msg; t.className='toast show'+(bad?' bad':''); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'), 3600); };

  async function api(payload){
    const r = await fetch('/api/admin', { method:'POST', headers:{'content-type':'application/json','x-admin-key':KEY}, body: JSON.stringify(payload) });
    const data = await r.json().catch(()=>({error:'bad response'}));
    if(!r.ok) throw new Error(data.error || ('HTTP '+r.status));
    return data;
  }

  function show(view){
    $('gate').classList.toggle('hidden', view!=='gate');
    $('listPanel').classList.toggle('hidden', view!=='list');
    $('formPanel').classList.toggle('hidden', view!=='form');
    $('lockBtn').classList.toggle('hidden', view==='gate');
    window.scrollTo({top:0});
  }

  const inclOf = p => { const r=(parseFloat(p.gst)||18)/100; return (p.retail||p.offer) ? Math.round((p.retail||p.offer)*(1+r)) : null; };
  const fmt = n => '₹'+Number(n).toLocaleString('en-IN');

  function renderList(){
    const q = ($('search').value||'').toLowerCase();
    const items = CATALOG.filter(p => !q || p.name.toLowerCase().includes(q) || p.id.includes(q));
    $('count').textContent = '· '+CATALOG.length+' total';
    $('list').innerHTML = items.map(p => `
      <div class="row">
        <img class="thumb" loading="lazy" src="${window.xvImg?xvImg(p.image||'',120):(p.image||'')}" alt="">
        <div>
          <div class="r-name">${p.name}</div>
          <div class="r-meta">${p.id} · ${p.collection}${inclOf(p)&&p.retail?` · <b>${fmt(inclOf(p))} incl. GST</b>`:' · B2B only'}${p.availability==='out_of_stock'?' · OUT OF STOCK':''}</div>
        </div>
        <div class="r-actions">
          <a class="btn btn-ghost" href="product.html?id=${encodeURIComponent(p.id)}" target="_blank">View</a>
          <button class="btn btn-ghost" data-edit="${p.id}">Edit</button>
          <button class="btn btn-danger" data-del="${p.id}">Delete</button>
        </div>
      </div>`).join('') || '<p class="hint">Kuch nahi mila.</p>';
  }

  function priceHint(){
    const gst=(parseFloat($('f_gst').value)||18)/100, retail=Number($('f_retail').value), mrp=Number($('f_mrp').value);
    if(retail>0){ const incl=Math.round(retail*(1+gst));
      $('priceHint').textContent = `Customer payega ${fmt(incl)} (incl. GST)` + (mrp>0 ? ` · MRP ${fmt(mrp)} se ${Math.round((1-incl/mrp)*100)}% off` : '') + (mrp>0 && incl>mrp ? '  ⚠ MRP se zyada!' : '');
    } else $('priceHint').textContent='';
  }
  ['f_retail','f_mrp','f_gst'].forEach(id=>$(id).addEventListener('input', priceHint));

  function openForm(p){
    editingId = p ? p.id : null;
    $('formTitle').textContent = p ? ('Edit — '+p.name) : 'Naya product';
    $('f_id').value = p?.id||''; $('f_id').readOnly = !!p;
    $('f_name').value=p?.name||''; $('f_collection').value=p?.collection||'Hot-Serve';
    $('f_series').value=p?.series||''; $('f_materials').value=p?.materials||'';
    $('f_tag').value=p?.tag||''; $('f_desc').value=p?.desc||'';
    $('f_sizes').value=p?.sizes||''; $('f_construction').value=p?.construction||'';
    $('f_moq').value=p?.moq||''; $('f_hsn').value=p?.hsn||''; $('f_gst').value=p?.gst||'';
    $('f_availability').value=p?.availability||'';
    $('f_mrp').value=p?.mrp||''; $('f_retail').value=p?.retail||''; $('f_offer').value=p?.offer||'';
    $('f_highlights').value=(p?.highlights||[]).join('\n');
    $('f_signature').checked=!!p?.signature;
    $('f_image').value=p?.image||''; $('imgPreview').src=p?.image||'data:image/gif;base64,R0lGODlhAQABAAAAACw=';
    $('f_file').value=''; $('imgStatus').textContent='JPG/PNG chuno — apne aap chhota (1600px) karke upload hoga.';
    priceHint(); show('form');
  }

  async function refresh(){
    const data = await api({action:'list'});
    CATALOG = data.products; renderList();
  }

  async function unlock(){
    KEY = $('keyInput').value.trim();
    if(!KEY) return toast('Key daalo', true);
    try{ await refresh(); sessionStorage.setItem('xv_admin_key', KEY); show('list'); }
    catch(e){ toast(e.message, true); }
  }
  $('unlockBtn').addEventListener('click', unlock);
  $('keyInput').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });
  $('lockBtn').addEventListener('click', ()=>{ sessionStorage.removeItem('xv_admin_key'); KEY=''; show('gate'); });
  $('search').addEventListener('input', renderList);
  $('addBtn').addEventListener('click', ()=>openForm(null));
  $('cancelBtn').addEventListener('click', ()=>show('list'));

  $('list').addEventListener('click', async e=>{
    const ed = e.target.closest('[data-edit]'); const del = e.target.closest('[data-del]');
    if(ed) openForm(CATALOG.find(p=>p.id===ed.dataset.edit));
    if(del){
      const p = CATALOG.find(x=>x.id===del.dataset.del);
      if(!confirm(`"${p.name}" (${p.id}) delete karein? Website, sitemap aur Google feed sab se hat jayega.`)) return;
      try{ await api({action:'delete', id:p.id}); toast('Delete ho gaya'); await refresh(); }
      catch(err){ toast(err.message, true); }
    }
  });

  $('f_file').addEventListener('change', async ()=>{
    const file = $('f_file').files[0]; if(!file) return;
    $('imgStatus').textContent='Photo chhota kar rahe…';
    try{
      const dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
      const img = await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=dataUrl; });
      const MAX=1600, sc=Math.min(1, MAX/Math.max(img.width,img.height));
      const cv=document.createElement('canvas'); cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      const jpeg = cv.toDataURL('image/jpeg', 0.85).split(',')[1];
      $('imgStatus').textContent='Upload ho raha…';
      const base = ($('f_id').value.trim()||'product').toLowerCase().replace(/[^a-z0-9-]/g,'-');
      const out = await api({action:'upload-image', name: base+'.jpg', dataBase64: jpeg});
      $('f_image').value = out.path; $('imgPreview').src = out.path;
      $('imgStatus').textContent = 'Upload ho gaya ✓ '+out.path;
    }catch(err){ $('imgStatus').textContent=''; toast('Photo upload fail: '+err.message, true); }
  });

  $('saveBtn').addEventListener('click', async ()=>{
    const product = {
      id: $('f_id').value, name: $('f_name').value, collection: $('f_collection').value,
      series: $('f_series').value, materials: $('f_materials').value, tag: $('f_tag').value,
      desc: $('f_desc').value, sizes: $('f_sizes').value, construction: $('f_construction').value,
      moq: $('f_moq').value, hsn: $('f_hsn').value, gst: $('f_gst').value,
      availability: $('f_availability').value,
      mrp: $('f_mrp').value, retail: $('f_retail').value, offer: $('f_offer').value,
      highlights: $('f_highlights').value.split('\n').map(s=>s.trim()).filter(Boolean),
      signature: $('f_signature').checked, image: $('f_image').value,
    };
    if(!product.image) { if(!confirm('Photo nahi lagi — bina photo ke save karein? (Card pe khali thumbnail dikhega)')) return; }
    $('saveBtn').disabled = true;
    try{
      await api({action:'save', product});
      toast('Save ho gaya — website pe ~1 minute me live, Google feed agle fetch pe');
      await refresh(); show('list');
    }catch(err){ toast(err.message, true); }
    $('saveBtn').disabled = false;
  });

  if(KEY){ refresh().then(()=>show('list')).catch(()=>{ KEY=''; sessionStorage.removeItem('xv_admin_key'); show('gate'); }); }
  else show('gate');
})();
</script>
</body>
</html>
